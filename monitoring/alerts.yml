groups:
  - name: devsecops-app-alerts
    interval: 30s
    rules:

      - alert: AppDown
        expr: up{job="devsecops-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "DevSecOps App is down"
          description: "The application has been unreachable for more than 1 minute."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High request latency (P95 > 1s)"
          description: "The 95th percentile request duration is above 1 second."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate (>5%)"
          description: "More than 5% of requests are returning 5xx errors."
