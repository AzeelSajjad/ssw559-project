global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'devsecops-ssw559'
    team: 'team-devsecops'

# Alert rules
rule_files:
  - /etc/prometheus/alerts.yml

# Alertmanager config (optional — uncomment if you set up Alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # DevSecOps Web Application
  - job_name: 'devsecops-app'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['app:3000']
        labels:
          service: 'devsecops-app'
          environment: 'production'
